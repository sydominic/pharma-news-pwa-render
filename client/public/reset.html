<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제약뉴스 RSS 대시보드 초기화</title>
    <style>
      body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f8fc;color:#0b213d;margin:0;padding:40px} .box{max-width:720px;margin:10vh auto;background:white;border:1px solid #d7e1ee;border-radius:20px;padding:28px;box-shadow:0 12px 24px rgba(8,31,63,.08)} h1{margin:0 0 12px;color:#081f3f} p{line-height:1.6;color:#475569;font-weight:700}
    </style>
  </head>
  <body>
    <div class="box">
      <h1>로컬 화면 초기화 중입니다</h1>
      <p>이전 Service Worker와 브라우저 캐시를 정리한 뒤 대시보드로 이동합니다.</p>
    </div>
    <script>
      (async () => {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((reg) => reg.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.filter((key) => key.startsWith('pharma-news-pwa')).map((key) => caches.delete(key)));
          }
        } catch (e) {
          console.warn(e);
        }
        location.replace('/?reset=' + Date.now());
      })();
    </script>
  </body>
</html>
