<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#081f3f" />
    <title>오프라인 - 제약뉴스 RSS 대시보드</title>
    <style>
      body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f8fc;color:#0b213d;display:grid;place-items:center;min-height:100vh;padding:24px}.box{max-width:520px;background:#fff;border:1px solid #d7e1ee;border-radius:24px;padding:28px;box-shadow:0 16px 36px rgba(8,31,63,.08)}h1{margin:0 0 12px;font-size:24px}p{line-height:1.6;color:#52657c}.badge{display:inline-block;background:#eaf3ff;color:#0065d8;border:1px solid #cde3ff;border-radius:999px;padding:6px 10px;font-weight:800;font-size:13px}.btn{display:inline-block;margin-top:12px;background:#081f3f;color:#fff;text-decoration:none;border-radius:14px;padding:11px 16px;font-weight:900}
    </style>
  </head>
  <body>
    <main class="box">
      <span class="badge">PWA 오프라인 안내</span>
      <h1>현재 네트워크에 연결할 수 없습니다.</h1>
      <p>앱 화면이 이미 열린 상태라면 마지막 성공 조회 스냅샷을 표시할 수 있습니다. 처음 접속하는 경우에는 네트워크 연결 후 다시 열어주십시오.</p>
      <a class="btn" href="/">다시 시도</a>
    </main>
  </body>
</html>
